# 数字生命 MVP 全局配置 (参见 docs/arch.md)

# 日志（目录相对项目根，可为绝对路径）
log_dir: "logs"
log_file: "soulseed.log"

# 历史对话（JSON 持久化，每次加载最新 N 条）
chat_history_file: "data/chat_history.json"
chat_history_max_entries: 20

# 调试：开启后在每次发送给大模型前将组装好的完整提示词打印到日志 (logs/soulseed.log)
debug_log_prompt: false

# 注入到提示词「环境感知」的墙钟时区（IANA，如 Asia/Shanghai）。服务器为 UTC 时务必设置，否则本地时间会与用户所在地不一致
app_timezone: "Asia/Shanghai"

# 主脑（LiteLLM + OpenAI-compatible 网关；模型名以 .env 的 CHAT_MODEL 为准，此处为无 .env 时的默认）
CHAT_MODEL: "deepseek-chat"
gemini_max_output_tokens: 8192         # 单轮回复最大 token 数

# 长期记忆（Mem0，嵌入与 LLM 均走网关，模型名同 .env 的 EMBEDDING_MODEL / CHAT_MODEL）
mem0_search_limit: 5                          # 每轮检索条数
mem0_embedding_dims: 768                      # 嵌入维度 (768/1536/3072)
mem0_llm_temperature: 0.2                     # 记忆提取温度
mem0_infer: true                               # true=只存 LLM 抽取的事实，false=存助手回复原文
# mem0_vector_store_path: "data/mem0/qdrant"  # 可选，默认 data/mem0/qdrant

# 眼睛（屏幕截取与多模态）
vision_enabled: false          # 是否每轮截屏并传入主脑
vision_interval: 2.0              # 秒（后续定时刷新用）
vision_max_longer_side: 768       # 较长边上限（先缩放再送主脑）。省 token 可改为 512
vision_save_enabled: true         # 是否将每轮截图存到 data 目录
vision_save_dir: "data/vision"    # 截图保存目录（相对项目根）
vision_save_format: "jpg"         # 存盘格式：jpg 更小，png 无损
vision_jpeg_quality: 72           # jpg 质量 (1-100)，送主脑与存盘共用。省 token 可改为 60～70

# 眼睛心跳检测：定时截图与上一张对比，有显著变化则触发主动说话
vision_heartbeat_enabled: false    # 是否开启心跳检测
vision_heartbeat_interval_sec: 60 # 检测间隔（秒）
vision_heartbeat_diff_threshold: 0.03  # 视为「有变化」的差异阈值 (0~1)，约 3% 像素变化

# TTS 音色 (依所用引擎填写，如 Edge-TTS 的 voice 名)
tts_voice: "zh-CN-XiaoxiaoNeural"
# 是否开启语音回复：助手回复中的「说的话」在流式结束后自动 TTS 播报（Web 前端）
tts_reply_enabled: false

# VAD 灵敏度 (0~1，越高越容易触发录音)
vad_sensitivity: 0.5

# Web API（与 main 解耦，独立启动）
web_host: "0.0.0.0"
web_port: 8765
web_reload: false

# Telegram Bot（独立入口 python -m src.telegram）
telegram_enabled: true
telegram_max_history_entries: 20   # 每会话：磁盘全量保存；发给主脑的上下文只取最近 20 条消息（约 10 轮），与 Web/CLI 的 chat_history 逻辑一致
# telegram_speaker_name: "Kurisu"  # 回复中「说的话」前的角色名，不填默认 Kurisu；可改为 "牧濑红莉栖" 等
# telegram_chat_history_dir: "data/telegram/chats"  # 可选，默认 data/telegram/chats

# VTube Studio
vts_host: "127.0.0.1"
vts_port: 8001
